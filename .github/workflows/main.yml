name: Send paper daily
on:
  workflow_dispatch:
    inputs:
      force:
        description: "Force send even if today's digest was already sent (bypasses the idempotency marker). Leave unchecked for normal runs — external schedulers like cron-job.org should NOT set this."
        type: boolean
        default: false
  schedule:
    # Every 15 min during UTC 23:00–03:59 (= Beijing 07:00–11:59), a ~5h window
    # generously surrounding the typical SEND_HOUR_BJ=9:30 target. The job then
    # enforces a strict ±60 min window around the configured target and an
    # idempotent "already sent today" guard, so at most one successful run per
    # Beijing day regardless of how many times GitHub actually fires.
    #
    # If you change SEND_HOUR_BJ substantially (e.g. to 20:00), update the
    # UTC hours below so the cron window still covers target ± ~1h.
    - cron: '*/15 23,0-3 * * *'

jobs:
  send-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Check Beijing-time schedule
        id: schedule_check
        env:
          SEND_HOUR_BJ: ${{ vars.SEND_HOUR_BJ }}
          SEND_MINUTE_BJ: ${{ vars.SEND_MINUTE_BJ }}
        run: |
          target_hour="${SEND_HOUR_BJ:-9}"
          target_minute="${SEND_MINUTE_BJ:-30}"
          current_bj_hour=$(TZ=Asia/Shanghai date +%-H)
          current_bj_minute=$(TZ=Asia/Shanghai date +%-M)
          bj_date=$(TZ=Asia/Shanghai date +%Y-%m-%d)
          target_mins=$(( target_hour * 60 + target_minute ))
          current_mins=$(( current_bj_hour * 60 + current_bj_minute ))
          diff=$(( current_mins - target_mins ))
          abs_diff=${diff#-}
          echo "bj_date=${bj_date}" >> "$GITHUB_OUTPUT"
          echo "Beijing time now = ${current_bj_hour}:$(printf '%02d' "$current_bj_minute"), target = ${target_hour}:$(printf '%02d' "$target_minute"), |diff| = ${abs_diff} min, trigger = ${{ github.event_name }}"
          # workflow_dispatch bypasses the window check: external schedulers
          # (cron-job.org etc.) already decided when to fire, and manual runs
          # should work any time of day.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "in_window=true" >> "$GITHUB_OUTPUT"
          elif [ "$abs_diff" -le 60 ]; then
            echo "in_window=true" >> "$GITHUB_OUTPUT"
          else
            echo "in_window=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping — Beijing time outside target ±60 min window"
          fi

      # Idempotency guard: if today's Beijing-date marker already exists in the
      # Actions cache, a prior run already sent today's digest. Skip without
      # running the pipeline again. Marker is written after a successful send.
      - name: Check if already sent today
        id: sent_check
        if: steps.schedule_check.outputs.in_window == 'true'
        uses: actions/cache/restore@v4
        with:
          path: state/.sent-marker
          key: sent-marker-${{ steps.schedule_check.outputs.bj_date }}
          lookup-only: true

      - name: Decide whether to run
        id: decide
        env:
          FORCE: ${{ inputs.force }}
        run: |
          # Priority 1: manual force-run (UI dispatch with force=true) always runs.
          # Priority 2: outside target window (schedule only) → skip.
          # Priority 3: already sent today (marker cache-hit) → skip. Applies to
          #   both schedule AND workflow_dispatch without force, so a stray
          #   cron-job.org retry does NOT double-send.
          # Otherwise run.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${FORCE}" = "true" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Forced run (workflow_dispatch with force=true) — bypassing window and idempotency checks"
          elif [ "${{ steps.schedule_check.outputs.in_window }}" != "true" ]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
          elif [ "${{ steps.sent_check.outputs.cache-hit }}" = "true" ]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping — already sent for Beijing date ${{ steps.schedule_check.outputs.bj_date }}. Trigger workflow_dispatch with force=true to override."
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.decide.outputs.run == 'true'
        uses: actions/checkout@v6

      - name: Setup uv
        if: steps.decide.outputs.run == 'true'
        uses: astral-sh/setup-uv@v7

      # Rolling score history is persisted per-fork via actions/cache, not
      # committed to git. This keeps each fork's state fully isolated (upstream
      # never leaks its scored papers to downstream forks) and avoids bloating
      # the repo with one commit per run.
      - name: Restore rolling score history
        if: steps.decide.outputs.run == 'true'
        uses: actions/cache/restore@v4
        with:
          path: state/score_history.json
          key: score-history-${{ github.run_id }}
          restore-keys: |
            score-history-

      - name: Run script
        if: steps.decide.outputs.run == 'true'
        env:
          SENDER: ${{ secrets.SENDER }}
          RECEIVER: ${{ secrets.RECEIVER }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_API_BASE: ${{ secrets.OPENAI_API_BASE }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          OPENAI_MAX_TOKENS: ${{ vars.OPENAI_MAX_TOKENS }}
          CUSTOM_CONFIG: ${{ vars.CUSTOM_CONFIG }}
        run: |
          # GitHub Actions exports empty string when vars.X is unset, which defeats
          # OmegaConf's ${oc.env:X,default} fallback. Re-default here.
          if [ -z "${OPENAI_MODEL:-}" ]; then export OPENAI_MODEL="gpt-4o-mini"; fi
          if [ -z "${OPENAI_MAX_TOKENS:-}" ]; then export OPENAI_MAX_TOKENS="4096"; fi
          echo "Using OPENAI_MODEL=$OPENAI_MODEL"
          echo "Using OPENAI_MAX_TOKENS=$OPENAI_MAX_TOKENS"
          if [ -n "$CUSTOM_CONFIG" ]; then
            # Use %s (not %b) so backslashes in the user's YAML are preserved literally.
            printf "%s\n" "$CUSTOM_CONFIG" > config/custom.yaml
            echo "Wrote config/custom.yaml from CUSTOM_CONFIG repo variable."
          else
            echo "::warning::CUSTOM_CONFIG repo variable is empty — falling back to repo's config/custom.yaml (neutral: will fail loudly)."
          fi
          echo "Effective config/custom.yaml:"
          cat config/custom.yaml
          echo "---"
          echo "Effective source.arxiv keywords (from the YAML above):"
          awk '/^source:/{s=1} s && /^[^ ]/ && !/^source:/{s=0} s' config/custom.yaml | sed -n '/keywords:/,/^[^ ]/p' || true
          uv run src/auto_read_paper/main.py

      - name: Save rolling score history
        if: steps.decide.outputs.run == 'true' && success()
        uses: actions/cache/save@v4
        with:
          path: state/score_history.json
          key: score-history-${{ github.run_id }}

      # Mark today's Beijing date as sent so later triggers on the same day
      # short-circuit at the idempotency guard above. Cache entries are immutable
      # by key, so we only write once per Beijing date.
      #
      # Skipped when inputs.force=true: a forced run is ad-hoc (testing / manual
      # resend outside window) and must NOT overwrite the day's canonical send
      # state, otherwise the real scheduled 10:00 run would be suppressed.
      - name: Write sent marker
        if: steps.decide.outputs.run == 'true' && success() && steps.sent_check.outputs.cache-hit != 'true' && inputs.force != true
        run: |
          mkdir -p state
          TZ=Asia/Shanghai date --iso-8601=seconds > state/.sent-marker
          echo "Wrote state/.sent-marker for Beijing date ${{ steps.schedule_check.outputs.bj_date }}"

      - name: Save sent marker
        if: steps.decide.outputs.run == 'true' && success() && steps.sent_check.outputs.cache-hit != 'true' && inputs.force != true
        uses: actions/cache/save@v4
        with:
          path: state/.sent-marker
          key: sent-marker-${{ steps.schedule_check.outputs.bj_date }}
