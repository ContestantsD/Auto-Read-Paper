email:
  sender: ${oc.env:SENDER}
  receiver: ${oc.env:RECEIVER}
  smtp_server: smtp.qq.com
  smtp_port: 465
  sender_password: ${oc.env:SENDER_PASSWORD}

llm:
  api:
    key: ${oc.env:OPENAI_API_KEY}
    base_url: ${oc.env:OPENAI_API_BASE}
  generation_kwargs:
    model: ${oc.env:OPENAI_MODEL,gpt-4o-mini}
    max_tokens: ${oc.decode:${oc.env:OPENAI_MAX_TOKENS,4096}}
  language: Chinese

source:
  arxiv:
    category: ["cs.RO", "cs.AI", "cs.LG", "cs.CV", "eess.SY"]
    include_cross_list: true
    keywords:
      - "autonomous driving"
      - "self-driving"
      - "end-to-end driving"
      - "automated vehicle"
      - "motion planning"
      - "trajectory planning"
      - "trajectory prediction"
      - "behavior prediction"
      - "driving policy"
      - "decision making"
      - "lane change"
      - "vehicle control"
      - "reinforcement learning"
      - "model predictive control"
      - "residual policy"
      - "imitation learning"
      - "bird's eye view"
      - "world model"
      - "CARLA"
      - "nuScenes"
      - "nuPlan"

executor:
  debug: ${oc.env:DEBUG,null}
  send_empty: false
  max_paper_num: 10
  source: ['arxiv']
  # 'reader_reviewer' = multi-agent (Reader notes + Reviewer global scoring, default, token-efficient, better ranking).
  # 'keyword_llm'     = single-agent (per-paper LLM scoring, simpler).
  reranker: reader_reviewer
