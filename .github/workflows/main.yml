name: Send paper daily
# Trigger is external-only: invoke this workflow via cron-job.org (or any
# minute-accurate scheduler) hitting the GitHub workflow_dispatch API at the
# exact Beijing time you want the email sent. See README step 5 for setup.
#
# GitHub's built-in `schedule:` cron is intentionally NOT used — it drifts
# 5-15 min and frequently drops fires in low-traffic windows, which was the
# original reason this project is hard to get to send at a precise time.
on:
  workflow_dispatch:
    inputs:
      force:
        description: "Force send even if today's digest was already sent (bypasses the idempotency marker). Leave unchecked for normal runs — external schedulers like cron-job.org should NOT set this."
        type: boolean
        default: false

jobs:
  send-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve Beijing date
        id: bj_date
        run: |
          echo "value=$(TZ=Asia/Shanghai date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      # Idempotency guard: if today's Beijing-date marker already exists in
      # the Actions cache, a prior run already sent today's digest. Skip
      # without running the pipeline again. This protects against:
      #   - cron-job.org double-firing (rare glitches, retries)
      #   - user manually re-clicking Run workflow on the same day
      # Bypassed when inputs.force=true.
      - name: Check if already sent today
        id: sent_check
        if: inputs.force != true
        uses: actions/cache/restore@v4
        with:
          path: state/.sent-marker
          key: sent-marker-${{ steps.bj_date.outputs.value }}
          lookup-only: true

      - name: Decide whether to run
        id: decide
        run: |
          if [ "${{ inputs.force }}" = "true" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Forced run (force=true) — bypassing idempotency check"
          elif [ "${{ steps.sent_check.outputs.cache-hit }}" = "true" ]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping — already sent for Beijing date ${{ steps.bj_date.outputs.value }}. Re-run with force=true to override."
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.decide.outputs.run == 'true'
        uses: actions/checkout@v6

      - name: Setup uv
        if: steps.decide.outputs.run == 'true'
        uses: astral-sh/setup-uv@v7

      # Rolling score history is persisted per-fork via actions/cache, not
      # committed to git. This keeps each fork's state fully isolated (upstream
      # never leaks its scored papers to downstream forks) and avoids bloating
      # the repo with one commit per run.
      - name: Restore rolling score history
        if: steps.decide.outputs.run == 'true'
        uses: actions/cache/restore@v4
        with:
          path: state/score_history.json
          key: score-history-${{ github.run_id }}
          restore-keys: |
            score-history-

      - name: Run script
        if: steps.decide.outputs.run == 'true'
        env:
          SENDER: ${{ secrets.SENDER }}
          RECEIVER: ${{ secrets.RECEIVER }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_API_BASE: ${{ secrets.OPENAI_API_BASE }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          OPENAI_MAX_TOKENS: ${{ vars.OPENAI_MAX_TOKENS }}
          CUSTOM_CONFIG: ${{ vars.CUSTOM_CONFIG }}
        run: |
          # GitHub Actions exports empty string when vars.X is unset, which defeats
          # OmegaConf's ${oc.env:X,default} fallback. Re-default here.
          if [ -z "${OPENAI_MODEL:-}" ]; then export OPENAI_MODEL="gpt-4o-mini"; fi
          if [ -z "${OPENAI_MAX_TOKENS:-}" ]; then export OPENAI_MAX_TOKENS="4096"; fi
          echo "Using OPENAI_MODEL=$OPENAI_MODEL"
          echo "Using OPENAI_MAX_TOKENS=$OPENAI_MAX_TOKENS"
          if [ -n "$CUSTOM_CONFIG" ]; then
            # Use %s (not %b) so backslashes in the user's YAML are preserved literally.
            printf "%s\n" "$CUSTOM_CONFIG" > config/custom.yaml
            echo "Wrote config/custom.yaml from CUSTOM_CONFIG repo variable."
          else
            echo "::warning::CUSTOM_CONFIG repo variable is empty — falling back to repo's config/custom.yaml (neutral: will fail loudly)."
          fi
          echo "Effective config/custom.yaml:"
          cat config/custom.yaml
          echo "---"
          echo "Effective source.arxiv keywords (from the YAML above):"
          awk '/^source:/{s=1} s && /^[^ ]/ && !/^source:/{s=0} s' config/custom.yaml | sed -n '/keywords:/,/^[^ ]/p' || true
          uv run src/auto_read_paper/main.py

      - name: Save rolling score history
        if: steps.decide.outputs.run == 'true' && success()
        uses: actions/cache/save@v4
        with:
          path: state/score_history.json
          key: score-history-${{ github.run_id }}

      # Mark today's Beijing date as sent so any later trigger on the same
      # day short-circuits at the idempotency guard above. Skipped when
      # force=true — a forced run is ad-hoc (debugging / manual resend) and
      # must NOT overwrite the day's canonical send state.
      - name: Write sent marker
        if: steps.decide.outputs.run == 'true' && success() && inputs.force != true
        run: |
          mkdir -p state
          TZ=Asia/Shanghai date --iso-8601=seconds > state/.sent-marker
          echo "Wrote state/.sent-marker for Beijing date ${{ steps.bj_date.outputs.value }}"

      - name: Save sent marker
        if: steps.decide.outputs.run == 'true' && success() && inputs.force != true
        uses: actions/cache/save@v4
        with:
          path: state/.sent-marker
          key: sent-marker-${{ steps.bj_date.outputs.value }}
